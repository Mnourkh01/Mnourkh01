name: Generate Snake

on:
  schedule:
    # Rebuild the snake twice a day so it stays in sync with new contributions
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=6DB33F&color_dots=ebedf0,9be9a8,6DB33F,40A02B,216E1F
            dist/github-snake-dark.svg?palette=github-dark&color_snake=7F52FF&color_dots=161b22,2d2640,5b46a8,7F52FF,a06bff

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
